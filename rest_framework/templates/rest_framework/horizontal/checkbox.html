<div class="mb-3 row horizontal-checkbox">
  {% if field.label %}
    <label class="col-sm-2 col-form-label {% if style.hide_label %}visually-hidden{% endif %}">
      {{ field.label }}
    </label>
  {% endif %}

  <div class="col-sm-10">
    <input type="checkbox" name="{{ field.name }}" value="true" {% if field.value %}checked{% endif %}>

    {% if field.errors %}
      {% for error in field.errors %}
        <span class="invalid-feedback">{{ error }}</span>
      {% endfor %}
    {% endif %}

    {% if field.help_text %}
      <span class="form-text">{{ field.help_text|safe }}</span>
    {% endif %}
  </div>
</div>
