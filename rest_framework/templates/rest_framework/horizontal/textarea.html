<div class="mb-3 row">
  {% if field.label %}
    <label class="col-sm-2 col-form-label {% if style.hide_label %}visually-hidden{% endif %}">
      {{ field.label }}
    </label>
  {% endif %}

  <div class="col-sm-10">
    <textarea name="{{ field.name }}" class="form-control" {% if style.placeholder %}placeholder="{{ style.placeholder }}"{% endif %} {% if style.rows %}rows="{{ style.rows }}"{% endif %}>{% if field.value %}{{ field.value }}{% endif %}</textarea>

    {% if field.errors %}
      {% for error in field.errors %}
        <span class="invalid-feedback">{{ error }}</span>
      {% endfor %}
    {% endif %}

    {% if field.help_text %}
      <span class="form-text">{{ field.help_text|safe }}</span>
    {% endif %}
  </div>
</div>
