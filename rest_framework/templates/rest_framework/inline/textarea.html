<div class="mb-3">
  {% if field.label %}
    <label class="visually-hidden">
      {{ field.label }}
    </label>
  {% endif %}

  <input name="{{ field.name }}" type="text" class="form-control" {% if style.placeholder %}placeholder="{{ style.placeholder }}"{% endif %} {% if field.value %}value="{{ field.value }}"{% endif %}>
</div>
