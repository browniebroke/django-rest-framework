{% load rest_framework %}
{{ form.non_field_errors }}
{% for field in form %}
  <div class="mb-3 row">
    {{ field.label_tag|add_class:"col-sm-2 col-form-label" }}
    <div class="col-sm-10">
      {{ field|add_class:"form-control" }}
      <span class="form-text">{{ field.help_text|safe }}</span>
    </div>
  </div>
{% endfor %}
